name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache ngrok-java JAR
        id: cache-ngrok-jar
        uses: actions/cache@v5
        with:
          path: vendor/ngrok-java/ngrok-java/target/ngrok-java-1.1.1.jar
          key: ngrok-jar-${{ runner.os }}-${{ hashFiles('vendor/ngrok-java/ngrok-java/pom.xml', 'vendor/ngrok-java/ngrok-java/src/**') }}

      - name: Build ngrok-java JAR (required for Gradle classpath)
        if: steps.cache-ngrok-jar.outputs.cache-hit != 'true'
        run: |
          cd vendor/ngrok-java
          mvn package -pl ngrok-java -DskipTests --global-toolchains toolchains.xml -q
        env:
          JAVA_11_HOME: ${{ env.JAVA_HOME }}
          JAVA_17_HOME: ${{ env.JAVA_HOME }}

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache ngrok-java host native build
        id: cache-ngrok-host
        uses: actions/cache@v5
        with:
          path: |
            vendor/ngrok-java/ngrok-java/target/ngrok-java-1.1.1.jar
            vendor/ngrok-java/ngrok-java-native/target/ngrok-java-native-classes.jar
            vendor/ngrok-java/ngrok-java-native/target/ngrok-java-native-host.jar
            vendor/ngrok-java/ngrok-java-native/target/release/libngrok_java.so
            vendor/ngrok-java/ngrok-java-native/target/release/libngrok_java.dylib
          key: ngrok-host-${{ runner.os }}-${{ hashFiles('.gitmodules', 'vendor/ngrok-java/**/*.toml', 'vendor/ngrok-java/**/pom.xml', 'vendor/ngrok-java/ngrok-java-native/src/**') }}

      - name: Cache Maven repository
        if: steps.cache-ngrok-host.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('vendor/ngrok-java/**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Set up Rust
        if: steps.cache-ngrok-host.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Build ngrok-java JAR and host native library (for JVM tests)
        if: steps.cache-ngrok-host.outputs.cache-hit != 'true'
        run: |
          cd vendor/ngrok-java
          mvn compile -pl ngrok-java-native --also-make --global-toolchains toolchains.xml -q
          mvn package -pl ngrok-java -DskipTests --global-toolchains toolchains.xml -q
          (cd ngrok-java-native/target/classes && jar cf ../ngrok-java-native-classes.jar com/)
          (cd ngrok-java-native && cargo build --release)
          (cd ngrok-java-native/target/release && jar cf ../ngrok-java-native-host.jar $(ls libngrok_java.so libngrok_java.dylib 2>/dev/null))
        env:
          JAVA_11_HOME: ${{ env.JAVA_HOME }}
          JAVA_17_HOME: ${{ env.JAVA_HOME }}

      - name: Run unit tests with coverage
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: ./gradlew :app:test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 14

      - name: Upload Jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/build/reports/jacoco/jacocoTestReport/html/
            app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 14

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-unit
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache cloudflared Android native
        id: cache-cloudflared
        uses: actions/cache@v5
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a/libcloudflared.so
            app/src/main/jniLibs/x86_64/libcloudflared.so
          key: cloudflared-android-${{ runner.os }}-${{ hashFiles('.gitmodules', 'vendor/cloudflared/**/*.go', 'vendor/cloudflared/go.sum') }}

      - name: Cache ngrok-java Android native
        id: cache-ngrok-android
        uses: actions/cache@v5
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a/libngrok_java.so
            app/src/main/jniLibs/x86_64/libngrok_java.so
            vendor/ngrok-java/ngrok-java/target/ngrok-java-1.1.1.jar
            vendor/ngrok-java/ngrok-java-native/target/ngrok-java-native-classes.jar
          key: ngrok-android-${{ runner.os }}-${{ hashFiles('.gitmodules', 'vendor/ngrok-java/**/*.toml', 'vendor/ngrok-java/**/pom.xml', 'vendor/ngrok-java/ngrok-java-native/src/**') }}

      - name: Set up Go
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Set up Rust
        if: steps.cache-ngrok-android.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile cloudflared for Android
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: make compile-cloudflared

      - name: Compile ngrok-java native for Android
        if: steps.cache-ngrok-android.outputs.cache-hit != 'true'
        run: make compile-ngrok-native
        env:
          JAVA_11_HOME: ${{ env.JAVA_HOME }}
          JAVA_17_HOME: ${{ env.JAVA_HOME }}

      - name: Build debug APK (required by E2E tests)
        run: ./gradlew assembleDebug

      - name: Set up Android platform-tools (adb)
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Checking for platform-tools..."
          ls -la "$ANDROID_HOME/platform-tools/adb" 2>/dev/null || echo "adb not found at $ANDROID_HOME/platform-tools/"
          ls "$ANDROID_HOME/" 2>/dev/null || echo "ANDROID_HOME directory not found"
          # Install platform-tools if not present
          if [ ! -f "$ANDROID_HOME/platform-tools/adb" ]; then
            echo "Installing platform-tools via sdkmanager..."
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" 2>/dev/null || \
              sudo apt-get install -y -qq android-sdk-platform-tools 2>/dev/null || \
              { echo "ERROR: Could not install platform-tools"; exit 1; }
          fi
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          "$ANDROID_HOME/platform-tools/adb" version

      - name: Set up redroid kernel modules
        run: |
          # Install kernel module package (binder_linux is in linux-modules-extra)
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-modules-extra-$(uname -r)
          # Load required kernel modules
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe fuse
          # Mount binderfs if not already mounted
          if ! mountpoint -q /dev/binderfs; then
            sudo mkdir -p /dev/binderfs
            sudo mount -t binder binder /dev/binderfs
          fi
          # Verify
          ls -la /dev/binderfs/
          lsmod | grep -E 'binder_linux|fuse'

      - name: Set up rootful podman socket
        run: |
          sudo apt-get install -y -qq podman
          sudo systemctl enable --now podman.socket
          sudo chmod 755 /run/podman
          sudo chmod 666 /run/podman/podman.sock
          # Verify socket is accessible
          curl -s --unix-socket /run/podman/podman.sock http://localhost/_ping

      - name: Pre-pull redroid image
        run: sudo podman pull redroid/redroid:13.0.0-latest

      - name: Run E2E tests
        env:
          DOCKER_HOST: unix:///run/podman/podman.sock
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./gradlew :e2e-tests:test

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-tests/build/reports/tests/
          retention-days: 14

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: test-e2e
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache cloudflared Android native
        id: cache-cloudflared
        uses: actions/cache@v5
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a/libcloudflared.so
            app/src/main/jniLibs/x86_64/libcloudflared.so
          key: cloudflared-android-${{ runner.os }}-${{ hashFiles('.gitmodules', 'vendor/cloudflared/**/*.go', 'vendor/cloudflared/go.sum') }}

      - name: Cache ngrok-java Android native
        id: cache-ngrok-android
        uses: actions/cache@v5
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a/libngrok_java.so
            app/src/main/jniLibs/x86_64/libngrok_java.so
            vendor/ngrok-java/ngrok-java/target/ngrok-java-1.1.1.jar
            vendor/ngrok-java/ngrok-java-native/target/ngrok-java-native-classes.jar
          key: ngrok-android-${{ runner.os }}-${{ hashFiles('.gitmodules', 'vendor/ngrok-java/**/*.toml', 'vendor/ngrok-java/**/pom.xml', 'vendor/ngrok-java/ngrok-java-native/src/**') }}

      - name: Set up Go
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Set up Rust
        if: steps.cache-ngrok-android.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile cloudflared for Android
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: make compile-cloudflared

      - name: Compile ngrok-java native for Android
        if: steps.cache-ngrok-android.outputs.cache-hit != 'true'
        run: make compile-ngrok-native
        env:
          JAVA_11_HOME: ${{ env.JAVA_HOME }}
          JAVA_17_HOME: ${{ env.JAVA_HOME }}

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
